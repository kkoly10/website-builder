name: Tests

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run for the same ref when a new commit lands —
# saves CI minutes on rapid pushes during development.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-unit:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npm run lint
      - name: HMAC verifier unit tests
        run: npm run test:unit

  email-structural-tests:
    name: email structural tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Playwright browser binaries are cached separately from
      # node_modules — re-downloading 110MB of Chromium on every CI
      # run is wasteful. Keying on the @playwright/test version in
      # package-lock.json invalidates the cache when Playwright bumps.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install OS deps when browsers were cached
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Email structural tests
        run: npm run test:emails

      # Upload the Playwright HTML report on failure so you can
      # inspect diffs / screenshots without re-running locally.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
